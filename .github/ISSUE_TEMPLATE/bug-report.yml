name: Bug Report
description: Report a reproducible bug in agent4quant
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明你遇到的问题和影响范围
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: 复现命令
      description: 请贴出完整命令、输入参数和运行环境
      placeholder: |
        source /Users/administrator/miniconda3/etc/profile.d/conda.sh
        conda activate openclaw
        PYTHONPATH=src python -m agent4quant.cli ...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 错误信息、异常响应、截图或归档路径
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
      description: 你期望看到什么结果
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响模块
      options:
        - quant-data
        - quant-backtest
        - quant-report
        - quant-alpha
        - quant-risk
        - api
        - docs/site
    validations:
      required: true

name: Feature Request
description: Request a new capability for the local-first quant skill toolkit
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 需求背景
      description: 你当前缺少什么能力，为什么重要
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 方案建议
      description: 建议增加的命令、接口、模板、provider 或发布物料
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - P1
        - P2
        - P3
        - P4
    validations:
      required: true

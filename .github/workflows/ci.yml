name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e '.[dev,duckdb]'
      - name: Run tests
        run: pytest
      - name: Bytecode compile check
        run: python -m compileall src tests
      - name: Static asset check
        run: |
          test -f apps/site/index.html
          test -f apps/site/robots.txt
          test -f apps/site/compliance.html

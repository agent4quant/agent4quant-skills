# Optional config file for user-managed external providers.
# Export one of:
#   export A4Q_EXTERNAL_PROVIDER_CONFIG=/absolute/path/to/external-providers.toml
#   export A4Q_CONFIG_PATH=/absolute/path/to/external-providers.toml

[market_data]
root = "/data/agent4quant/market-data"

[external_providers.local]
default_profile = "cn_daily"

[external_providers.local.cn_daily]
data_root = "/data/agent4quant/market-data"
market = "cn"
description = "CN daily local compatibility input"

[external_providers.duckdb.research_5m]
db_path = "/data/duckdb/research.duckdb"
market = "cn"
description = "Read-only DuckDB input for 5m research"

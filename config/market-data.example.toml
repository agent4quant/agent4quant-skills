# Point the local provider at your historical market data root.
# You can export the same path with:
# export A4Q_MARKET_DATA_ROOT=/path/to/market-data
# Or move to a profile-based config with:
# export A4Q_EXTERNAL_PROVIDER_CONFIG=/path/to/external-providers.toml

[market_data]
root = "/data/agent4quant/market-data"

# Supported layouts:
# 1. /root/5m/000001.SZ.csv
# 2. /root/1d/600000.SH.parquet
# 3. /root/000001.SZ/5m.csv
# 4. /root/000001.SZ_5m.csv
